# Short Modal run — the GO/NO-GO gate. ~2500 episodes, sized for a TRUSTWORTHY
# verdict (not speed), to answer the only question that matters before the full
# 50k run: does pure_policy_coverage (the exploration-OFF eval) climb off the
# ~7.1% floor? If yes, the LLM is learning -> scale up with train_config.yaml.
# If it stays flat through the ~1000 post-decay episodes while with-exploration
# mean_coverage looks fine, the scaffold is doing the work -> rethink (constrained
# action selection or a bigger model) before spending more.
model:
  name: "google/gemma-3-1b-it"
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]

training:
  learning_rate: 5e-5
  batch_size: 16
  max_episode_steps: 20
  bonus_steps_per_auth: 2
  bonus_steps_per_dependency: 2
  max_total_steps: 35
  fragility_threshold: 10
  fragility_penalty: -0.2
  fragility_warning_threshold: 3
  exploration_epsilon: 0.5
  exploration_epsilon_start: 0.5
  exploration_epsilon_end: 0.05
  exploration_decay_episodes: 1500   # gradual anneal; ~1000 post-decay episodes to watch the LLM stand alone
  episodes_per_update: 16
  grpo_group_size: 4
  checkpoint_every: 250
  total_episodes: 2500               # sized for a trustworthy verdict, not speed

reward:
  coverage_weight: 1.0
  destructive_penalty: 0.3
  new_endpoint_bonus: 0.05
  auth_token_bonus: 0.15
  repeated_request_penalty: 0.1

eval:
  enabled: true       # log pure-policy (exploration-off) coverage every checkpoint
  n_episodes: 12      # more eval episodes => less noisy go/no-go signal

factory:
  discoverable_index: true

curriculum:
  diversity_mode: "mixed"
  levels:
    1: {endpoints: 3, auth_schemes: 1, dependencies: 0, red_herrings: 0}
    2: {endpoints: 6, auth_schemes: 2, dependencies: 1, red_herrings: 1}
    3: {endpoints: 10, auth_schemes: 3, dependencies: 3, red_herrings: 2}
    4: {endpoints: 15, auth_schemes: 4, dependencies: 5, red_herrings: 3}
  zpd_advance_threshold: 0.70
  zpd_retreat_threshold: 0.40
  rolling_window: 30

modal:
  gpu: "A100"
  n_episode_workers: 16
  cpu_per_worker: 2
  memory_per_worker: 4096
  gpu_memory: 40960
  timeout_seconds: 300
  volume_name: "rsi-api-checkpoints"
  secret_name: "huggingface-secret"
  app_name: "rsi-api"

demo:
  websocket_port: 8765
  api_port: 8080
