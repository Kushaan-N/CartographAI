model:
  name: "google/gemma-3-4b-it"   # 4B instruction-tuned — must be the -it variant (per CLAUDE.md)
  lora_rank: 32          # same capacity as the 1B strengthened run
  lora_alpha: 64         # alpha/rank scaling stays 2.0
  lora_dropout: 0.05
  target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]

training:
  learning_rate: 1e-5    # same as 1B: low LR keeps GRPO stable, no collapse
  batch_size: 4
  max_episode_steps: 20
  episodes_per_update: 8  # 2 groups of 4 per update -> real contrastive signal
  grpo_group_size: 4     # group-relative advantage needs a few samples
  kl_coef: 0.05          # KL anchor to frozen warmup reference (prevents collapse)
  entropy_coef: 0.01     # entropy bonus (keeps the action distribution from peaking)
  checkpoint_every: 50
  total_episodes: 100
  bonus_steps_per_auth: 2
  bonus_steps_per_dependency: 2
  max_total_steps: 35
  fragility_threshold: 10
  fragility_penalty: -0.2
  fragility_warning_threshold: 3
  exploration_epsilon: 0.5
  exploration_epsilon_start: 0.5
  exploration_epsilon_end: 0.25    # keep a real exploration floor -> contrastive groups differ
  exploration_decay_episodes: 60

reward:
  coverage_weight: 1.0
  destructive_penalty: 0.3
  new_endpoint_bonus: 0.05
  auth_token_bonus: 0.15
  repeated_request_penalty: 0.1
  shaped_episode_weight: 0.1   # shaped step rewards folded into episode reward to break coverage ties

factory:
  discoverable_index: true

curriculum:
  levels:
    1: {endpoints: 3, auth_schemes: 1, dependencies: 0, red_herrings: 0}
    2: {endpoints: 6, auth_schemes: 2, dependencies: 1, red_herrings: 1}
    3: {endpoints: 10, auth_schemes: 3, dependencies: 3, red_herrings: 2}
    4: {endpoints: 15, auth_schemes: 4, dependencies: 5, red_herrings: 3}
  zpd_advance_threshold: 0.70
  zpd_retreat_threshold: 0.40
  rolling_window: 30

modal:
  gpu: "A100"
  n_episode_workers: 2
  cpu_per_worker: 2
  memory_per_worker: 4096
  gpu_memory: 40960
  timeout_seconds: 300
  volume_name: "rsi-api-checkpoints"
  secret_name: "huggingface-secret"
  app_name: "rsi-api"

demo:
  websocket_port: 8765
  api_port: 8080
