model:
  name: "google/gemma-3-1b-it"
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]

training:
  learning_rate: 5e-5
  batch_size: 32
  max_episode_steps: 20          # base budget
  bonus_steps_per_auth: 2        # bonus steps granted per auth token acquired
  bonus_steps_per_dependency: 2  # bonus steps granted per new dependency discovered
  max_total_steps: 35            # hard ceiling regardless of bonuses
  fragility_threshold: 5        # consecutive 4xx before API locks up
  fragility_penalty: -1.0       # reward penalty on lockout
  fragility_warning_threshold: 3  # consecutive 4xx before warning signal
  episodes_per_update: 32
  grpo_group_size: 4
  checkpoint_every: 500
  total_episodes: 50000

reward:
  coverage_weight: 1.0
  destructive_penalty: 0.3
  new_endpoint_bonus: 0.05
  auth_token_bonus: 0.15
  repeated_request_penalty: 0.1

curriculum:
  diversity_mode: "mixed"    # mixed | random | domain | versioned
  levels:
    1: {endpoints: 3, auth_schemes: 1, dependencies: 0, red_herrings: 0}
    2: {endpoints: 6, auth_schemes: 2, dependencies: 1, red_herrings: 1}
    3: {endpoints: 10, auth_schemes: 3, dependencies: 3, red_herrings: 2}
    4: {endpoints: 15, auth_schemes: 4, dependencies: 5, red_herrings: 3}
  zpd_advance_threshold: 0.70
  zpd_retreat_threshold: 0.40
  rolling_window: 30

modal:
  gpu: "A100"
  n_episode_workers: 50
  cpu_per_worker: 2
  memory_per_worker: 4096
  gpu_memory: 40960
  timeout_seconds: 300
  volume_name: "rsi-api-checkpoints"
  secret_name: "huggingface-secret"
  app_name: "rsi-api"

demo:
  websocket_port: 8765
  api_port: 8080
