<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSI-API Live Demo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #e6edf3; font-family: 'Courier New', monospace; height: 100vh; overflow: hidden; }
    #layout { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 48px; height: 100vh; }
    #graph-panel { border-right: 1px solid #21262d; position: relative; }
    #graph-svg { width: 100%; height: 100%; }
    #terminal-panel { overflow-y: auto; padding: 12px 16px; font-size: 13px; line-height: 1.6; }
    #coverage-bar-container { grid-column: 1 / -1; background: #161b22; border-top: 1px solid #21262d; display: flex; align-items: center; padding: 0 16px; gap: 16px; }
    #coverage-fill-track { flex: 1; height: 8px; background: #21262d; border-radius: 4px; overflow: hidden; }
    #coverage-fill { height: 100%; width: 0%; background: #238636; border-radius: 4px; transition: width 0.4s ease; }
    #coverage-label { font-size: 12px; color: #8b949e; min-width: 120px; }
    #level-label { font-size: 12px; color: #8b949e; }
    #inject-btn { font-size: 12px; background: #21262d; border: 1px solid #30363d; color: #e6edf3; padding: 4px 12px; border-radius: 4px; cursor: pointer; }
    #inject-btn:hover { background: #30363d; }
    #inject-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; width: 500px; z-index: 100; }
    #inject-modal h3 { color: #e6edf3; margin-bottom: 12px; font-size: 14px; }
    #inject-code { width: 100%; height: 120px; background: #0d1117; border: 1px solid #30363d; color: #e6edf3; font-family: monospace; font-size: 12px; padding: 8px; border-radius: 4px; resize: vertical; }
    #inject-submit { margin-top: 8px; background: #238636; border: none; color: white; padding: 6px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; }
    #inject-cancel { margin-top: 8px; margin-left: 8px; background: #21262d; border: 1px solid #30363d; color: #e6edf3; padding: 6px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .node-legend { position: absolute; top: 12px; left: 12px; font-size: 11px; color: #8b949e; }
    .legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  </style>
</head>
<body>
  <div id="layout">
    <div id="graph-panel">
      <svg id="graph-svg"></svg>
      <div class="node-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#8b949e"></div>hypothesized</div>
        <div class="legend-item"><div class="legend-dot" style="background:#d29922"></div>probing</div>
        <div class="legend-item"><div class="legend-dot" style="background:#238636"></div>discovered</div>
        <div class="legend-item"><div class="legend-dot" style="background:#da3633"></div>failed</div>
      </div>
    </div>
    <div id="terminal-panel"><div id="terminal-output"></div></div>
    <div id="coverage-bar-container">
      <span id="coverage-label">Coverage: 0%</span>
      <div id="coverage-fill-track"><div id="coverage-fill"></div></div>
      <span id="level-label">Level 1</span>
      <button id="inject-btn" onclick="openInject()">+ Inject Endpoint</button>
    </div>
  </div>

  <div id="inject-modal">
    <h3>Inject a live Flask endpoint</h3>
    <textarea id="inject-code" placeholder="@app.route('/secret')&#10;def secret():&#10;    if request.headers.get('X-Judge-Token') == 'yc2025':&#10;        return jsonify(data='top_secret')&#10;    return jsonify(error='Missing header: X-Judge-Token'), 403"></textarea>
    <br>
    <button id="inject-submit" onclick="submitInject()">Inject</button>
    <button id="inject-cancel" onclick="closeInject()">Cancel</button>
  </div>

  <script src="/static/graph.js"></script>
  <script src="/static/terminal.js"></script>
  <script>
    function openInject() { document.getElementById('inject-modal').style.display = 'block'; }
    function closeInject() { document.getElementById('inject-modal').style.display = 'none'; }
    async function submitInject() {
      const code = document.getElementById('inject-code').value;
      const res = await fetch('/inject', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({route_code: code})
      });
      const data = await res.json();
      appendLine(
        data.success ? `[INJECT] ${data.message}` : `[INJECT ERROR] ${data.error}`,
        data.success ? 'hint' : 'error'
      );
      closeInject();
    }
  </script>
</body>
</html>
